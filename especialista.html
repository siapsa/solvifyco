<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Solvify - Roberto Jimenez</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>

    :root {
      --primary: #7b3cff;
      --primary-soft: #f3ecff;
      --accent: #ff4f9a;
      --bg: #f7f7fb;
      --text: #222;
      --muted: #777;
      --card: #fff;
      --border: #e2e2ee;
      --radius: 10px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #1f2933;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e1e4ea;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: #7b3cff;
    }

    nav a {
      margin-left: 24px;
      text-decoration: none;
      color: #4b5563;
      font-size: 14px;
    }

     .nav-links {
      display: flex;
      gap: 1rem;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .breadcrumb {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .breadcrumb span {
      color: #111827;
      font-weight: 500;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 24px;
      display: grid;
      grid-template-columns: 1.1fr 1.2fr;
      gap: 24px;
      align-items: center;
    }

    .card-illustration {
      background: linear-gradient(135deg, #2563eb, #f97316);
      border-radius: 14px;
      padding: 20px;
      color: #ffffff;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 500;
    }

    .card-content h1 {
      font-size: 26px;
      margin-bottom: 4px;
    }

    .rating {
      font-size: 14px;
      color: #f59e0b;
      margin-bottom: 8px;
    }

    .rating span {
      color: #6b7280;
      margin-left: 4px;
    }

    .price {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .more-info {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .contact-block {
      font-size: 14px;
      color: #374151;
      display: grid;
      gap: 4px;
    }

    .contact-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca3af;
    }

    .contact-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .contact-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      header {
        padding: 12px 16px;
      }

      .card {
        grid-template-columns: 1fr;
      }

      .card-illustration {
        order: -1;
      }
    }

     .btn-primary {
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav-links">
    <a href="#" class="logo" onclick="window.location.href='ecomer.html'">Regresar</a>
    </nav>

    <div class="nav-right">
      

      <button class="btn-primary">Contáctenos</button>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumb">
      Todos los productos / <span>Roberto Jimenez</span>
    </div>


    <section class="card">
      <div class="card-illustration">
        Ilustración del técnico / servicio
      </div>

      <div class="card-content">
        <h1>Roberto Jimenez</h1>
        <div class="rating">
          ★★★★★ <span>(5 reseñas)</span>
        </div>
        <div class="price">100,00 B/.</div>

        <div class="buttons">
          <button class="btn btn-secondary">Cotizar</button>
          <button class="btn btn-primary">Contratar</button>
        </div>

        <p class="more-info">
          Este contenido se compartirá a través de todas las páginas de productos.
        </p>

        <div class="contact-block">
          <div>
            <span class="contact-label">Teléfono</span><br />
            +507 62804587
          </div>
          <div>
            <span class="contact-label">Contacto</span><br />
            Aldhair Atencio
          </div>
          <div>
            <a href="#" class="contact-link">Contáctenos</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
