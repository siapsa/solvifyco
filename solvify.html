<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Solvify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --primary: #7b3cff;
      --primary-soft: #f4ecff;
      --text-main: #1f1f2e;
      --text-muted: #6b6b80;
      --bg: #ffffff;
      --border-soft: #e3e3f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
    }

    /* NAVBAR */
    header {
      border-bottom: 1px solid var(--border-soft);
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .nav-logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #ff9ad5, #ff4f9a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 0.95rem;
    }

    .nav-center a {
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .nav-center a:hover {
      color: var(--primary);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.9rem;
    }

    .nav-phone {
      color: var(--text-muted);
      white-space: nowrap;
    }

    .nav-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
    }

    .btn-primary {
      border-radius: 999px;
      border: none;
      padding: 8px 18px;
      background: var(--primary);
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      box-shadow: 0 8px 18px rgba(123, 60, 255, 0.25);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(123, 60, 255, 0.3);
      background: #6a2df0;
    }

    /* HERO */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 40px;
      align-items: center;
    }

    .hero-left h1 {
      font-size: 2.4rem;
      margin-bottom: 16px;
    }

    .hero-left h1 span {
      color: var(--primary);
    }

    .hero-text {
      font-size: 0.98rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .hero-text p + p {
      margin-top: 6px;
    }

    .hero-cta {
      margin-top: 10px;
    }

    .hero-cta button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
    }

    .hero-cta button span.arrow {
      font-size: 1.1rem;
    }

    /* HERO RIGHT */
    .hero-right {
      display: flex;
      justify-content: center;
    }

    .hero-card {
      width: 260px;
      border-radius: 24px;
      padding: 26px 20px 24px;
      background: linear-gradient(145deg, #ffffff, #f7f0ff);
      box-shadow: 0 18px 40px rgba(40, 20, 90, 0.18);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-card-logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: radial-gradient(circle at 30% 20%, #ff9ad5, #ff4f9a);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero-card-logo-inner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #ff4f9a;
    }

    .hero-card h2 {
      font-size: 1.2rem;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    .hero-card p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .hero-card-tag {
      position: absolute;
      top: 16px;
      right: 18px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .hero-right {
        order: -1;
      }

      .nav-center {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .nav {
        padding-inline: 14px;
      }

      .nav-phone {
        display: none;
      }

      .hero-left h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="nav-left">
        
        <span>Solvify</span>
      </div>

      <div class="nav-right">
        
        <button class="nav-icon-btn" aria-label="Carrito">🛒</button>
        
        <button class="btn-primary">Contáctenos</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero-left" id="inicio">
      <h1>Bienvenidos a <span>Solvify</span>.</h1>
      <div class="hero-text">
        <p>🌟 En Solvify, conectamos a los mejores especialistas con quienes buscan soluciones confiables.</p>
        <p>🔍 Explora nuestro directorio de expertos y encuentra el servicio que necesitas.</p>
        <p>💼 ¡Soluciones a un clic de distancia! 🚀</p>
      </div>
      <div class="hero-cta">
        <button class="btn-primary" onclick="window.location.href='ecomer.html'">
          Empezar ahora
          <span class="arrow">➜</span>
        </button>
      </div>
    </section>

    <aside class="hero-right">
      <div class="hero-card">
       <img src="logo.jpg" width="200">

        </div>
        
      </div>
    </aside>
  </main>
</body>
</html>
